# nixpacks.toml - Optimizado para Railway (Memoria Limitada)

[phases.setup]
nixPkgs = ["nodejs_20", "go"]

[phases.install]
# Asegurar que se instalen devDependencies y limitar memoria
cmds = [
    "cd frontend && npm install --include=dev --no-audit --no-fund",
    "go mod download"
]

[phases.build]
# Forzar NODE_ENV=development para que Vite encuentre sus plugins
cmds = [
    "cd frontend && NODE_OPTIONS='--max-old-space-size=400' NODE_ENV=development npm run build",
    "go build -tags server -ldflags='-s -w' -o sheepmaster ."
]

[start]
cmd = "./sheepmaster"

[variables]
CGO_ENABLED = "0"
GOOS = "linux"
GOPROXY = "https://proxy.golang.org,direct"
NODE_ENV = "production"
